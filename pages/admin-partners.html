<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>طلبات الشراكة</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/app-shell.css" />
    <link rel="stylesheet" href="../css/admin-partners.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="./auth-guard.js"></script>
  </head>
  <body class="app-shell">
    <aside class="app-sidebar">
      <div class="brand-badge">
        <i class="fa-solid fa-bag-shopping"></i>
        <div>
          <strong>Buda Admin</strong>
          <small>إدارة المتجر</small>
        </div>
      </div>
      <nav class="side-nav">
        <a class="side-link" href="shacksf.html"><i class="fa-solid fa-chart-line"></i><span>لوحة التحكم</span></a>
        <a class="side-link" href="admin.html"><i class="fa-solid fa-square-plus"></i><span>إضافة المنتجات</span></a>
        <a class="side-link" href="admin-orders.html"><i class="fa-solid fa-receipt"></i><span>الطلبات</span></a>
        <a class="side-link active" href="admin-partners.html"><i class="fa-solid fa-handshake"></i><span>طلبات الشراكة</span></a>
        <a class="side-link" href="view-products.html"><i class="fa-solid fa-box-open"></i><span>مراجعة المنتجات</span></a>
      </nav>
    </aside>

    <main class="app-main">
      <header class="app-topbar">
        <div class="topbar-title">
          <h1>طلبات الشراكة</h1>
          <p>متابعة مباشرة لطلبات انضمام المتاجر كل 4 ثوانٍ</p>
        </div>
      </header>

      <section class="content-wrap partners-page">
        <section class="card partners-summary">
          <div class="summary-box">
            <p>إجمالي الطلبات</p>
            <strong id="partnersCount">0</strong>
          </div>
          <div class="summary-box">
            <p>آخر تحديث</p>
            <strong id="lastRefresh">--:--</strong>
          </div>
        </section>

        <section class="card partners-filters">
          <div class="field-block grow">
            <label for="searchInput">بحث بالاسم أو البريد أو الهاتف</label>
            <input type="text" id="searchInput" placeholder="ابحث في الطلبات..." />
          </div>
          <div class="field-block">
            <label for="statusFilter">الحالة</label>
            <select id="statusFilter">
              <option value="all">كل الحالات</option>
              <option value="pending">قيد الانتظار</option>
              <option value="approved">مقبول</option>
              <option value="rejected">مرفوض</option>
            </select>
          </div>
        </section>

        <section id="applications" class="partners-list"></section>
      </section>
    </main>

    <nav class="mobile-bottom-nav">
      <a class="mobile-link" href="shacksf.html"><i class="fa-solid fa-chart-line"></i><span>الرئيسية</span></a>
      <a class="mobile-link" href="admin.html"><i class="fa-solid fa-square-plus"></i><span>إضافة</span></a>
      <a class="mobile-link" href="admin-orders.html"><i class="fa-solid fa-receipt"></i><span>طلبات</span></a>
      <a class="mobile-link active" href="admin-partners.html"><i class="fa-solid fa-handshake"></i><span>شراكة</span></a>
      <a class="mobile-link" href="view-products.html"><i class="fa-solid fa-box-open"></i><span>مراجعة</span></a>
    </nav>

    <script src="./admin-partners.page.js"></script>
  </body>
</html>
