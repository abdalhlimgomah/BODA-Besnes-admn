<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>مراجعة المنتجات</title>
    <link rel="stylesheet" href="../css/theme.css" />
    <link rel="stylesheet" href="../css/app-shell.css" />
    <link rel="stylesheet" href="../css/view-products.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="./auth-guard.js"></script>
  </head>
  <body class="app-shell">
    <aside class="app-sidebar">
      <div class="brand-badge">
        <i class="fa-solid fa-bag-shopping"></i>
        <div>
          <strong>Buda Admin</strong>
          <small>إدارة المتجر</small>
        </div>
      </div>
      <nav class="side-nav">
        <a class="side-link" href="shacksf.html"><i class="fa-solid fa-chart-line"></i><span>لوحة التحكم</span></a>
        <a class="side-link" href="admin.html"><i class="fa-solid fa-square-plus"></i><span>إضافة المنتجات</span></a>
        <a class="side-link" href="admin-orders.html"><i class="fa-solid fa-receipt"></i><span>الطلبات</span></a>
        <a class="side-link" href="admin-partners.html"><i class="fa-solid fa-handshake"></i><span>طلبات الشراكة</span></a>
        <a class="side-link active" href="view-products.html"><i class="fa-solid fa-box-open"></i><span>مراجعة المنتجات</span></a>
      </nav>
    </aside>

    <main class="app-main">
      <header class="app-topbar">
        <div class="topbar-title">
          <h1>مراجعة المنتجات</h1>
          <p>إدارة حالة مراجعة منتجات التجار</p>
        </div>
      </header>

      <section class="content-wrap review-page">
        <section class="card review-summary">
          <div class="summary-item">
            <p>إجمالي المنتجات</p>
            <strong id="productsCount">0</strong>
          </div>
          <div class="summary-item">
            <p>قيد المراجعة</p>
            <strong id="pendingCount">0</strong>
          </div>
          <div class="summary-item">
            <p>تمت المراجعة</p>
            <strong id="reviewedCount">0</strong>
          </div>
        </section>

        <section class="card review-filters">
          <div class="field-block grow">
            <label for="searchInput">بحث باسم المنتج أو البريد</label>
            <input type="text" id="searchInput" placeholder="ابحث الآن..." />
          </div>
          <div class="field-block">
            <label for="reviewFilter">حالة المراجعة</label>
            <select id="reviewFilter">
              <option value="all">الكل</option>
              <option value="pending">قيد المراجعة</option>
              <option value="reviewed">تمت المراجعة</option>
            </select>
          </div>
        </section>

        <section class="products-grid" id="productsGrid"></section>
      </section>
    </main>

    <nav class="mobile-bottom-nav">
      <a class="mobile-link" href="shacksf.html"><i class="fa-solid fa-chart-line"></i><span>الرئيسية</span></a>
      <a class="mobile-link" href="admin.html"><i class="fa-solid fa-square-plus"></i><span>إضافة</span></a>
      <a class="mobile-link" href="admin-orders.html"><i class="fa-solid fa-receipt"></i><span>طلبات</span></a>
      <a class="mobile-link" href="admin-partners.html"><i class="fa-solid fa-handshake"></i><span>شراكة</span></a>
      <a class="mobile-link active" href="view-products.html"><i class="fa-solid fa-box-open"></i><span>مراجعة</span></a>
    </nav>

    <script src="./view-products.page.js?v=20260327-2"></script>
  </body>
</html>
